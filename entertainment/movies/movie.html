<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>엘리나 Elina - Film</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/Elina/logos/daisy.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/Elina/logos/daisy.png">
  <link rel="stylesheet" href="/Elina/css/bulma.min.css">
  <link rel="stylesheet" href="/Elina/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>


<main>
    
    <section class="section">
        
        <div class="container">
            
            <div id="nav-container"></div>
            
            <div class="box">

                <h1 class="title is-1 mt-6 mb-2"><span class="icon"><i class="fa-solid fa-film"></i></span> <span id="movie-title"></span></h1>
                <h3 class="subtitle is-3 mb-6" id="movie-year"></h3>

                <div class="columns is-four-fifths">
                    <div class="column is-one-quarter">
                        <img src="/Elina/entertainment/movies/poster.png" class="image is-clickable js-modal-trigger" id="movie-poster" data-target="div-modal-poster" style="border-radius: 5px;" />
                    </div>
                    <div class="block column is-three-quarters">
                        <div class="buttons mb-2" id="movie-list-buttons">
                            <button class="button is-link is-hidden" id="button-add-movie"><span class="icon"><i class="fa-solid fa-plus"></i></span><span>Ajouter</span></button>
                            <button class="button is-success is-light is-hidden" id="button-tosee-movie"><span class="icon"><i class="fa-solid fa-eye"></i></span><span>J'ai vu</span></button>
                            <button class="button is-danger is-light is-hidden" id="button-supp-movie"><span class="icon"><i class="fa-solid fa-minus"></i></span><span>Supprimer</span></button>
                            <button class="button is-success is-hidden" id="button-seen-movie"><span class="icon"><i class="fa-solid fa-check"></i></span><span>Vu</span></button>
                        </div>
                        <div id="div-seen" class="is-hidden mb-4">
                            <button href="#" id="movie-date-seen" class="js-modal-trigger tag is-medium" data-target="change-date-seen"></button>
                            <button id="movie-fav" class="tag is-large is-hoverable" style="background-color: transparent;"><i class="fa-solid fa-heart"></i></button>
                            <button id="movie-unlike" class="tag is-large is-hoverable" style="background-color: transparent;"><i class="fa-solid fa-heart-crack"></i></button>
                        </div>
                        <p id="movie-genres"><span class="subtitle is-4 mb-6 mr-3" id="movie-time"></span><span class="mr-3">&#x2022;</span></p>
                        <div class="grid is-mobile">
                            <div class="cell">
                                <h3 class="subtitle is-4 mt-6 mb-2">Réalisateur(s)</h3>
                                <ul id="directors" class="is-flex"></ul>
                            </div>
                            <div class="cell">
                                <h3 class="subtitle is-4 mt-6 mb-2">Scénariste(s)</h3>
                                <ul id="scriptwriters" class="is-flex"></ul>
                            </div>
                        </div>
                        <ul id="movie-platforms mt-6"></ul>
                        <h3 class="subtitle is-4 mt-6 mb-2">Synopsis</h3>
                        <p class="content" id="movie-synopsis"></p>
                    </div>
                </div>

                <div class="columns" id="div-actors"></div>
            
            </div>
        </div>

        <div class="modal" id="div-modal-poster" style="min-height: 95%;">
            <div class="modal-background"></div>
            <div class="modal-content">
                <p class="image is-2by3">
                    <img src="/Elina/entertainment/movies/poster.png" alt="Affiche" id="modal-poster" data-target="change-own-poster">
                    <p><button class="button my-3 js-modal-trigger" id="add-own-poster">Personnaliser ma couverture</button></p>
                    <div class="field my-3 is-hidden" id="div-add-own-poster">
                        <input type="text" id="src-add-own-poster" class="input mr-2" style="width:50%" />
                        <button type="button" id="btn-add-own-poster" class="button is-primary">Ajouter</button>
                    </div>
                </p>
            </div>
            <button class="modal-close is-large" aria-label="close"></button>
        </div>

        <div id="change-own-poster" class="modal">
            <div class="modal-background"></div>
            <div class="modal-content box">
                <h5 class="title">Personnaliser votre poster</h5>
                <div class="is-flex">
                    <input class="input mr-4" type="text" id="input-change-own-poster" />
                    <button class="button" id="button-change-own-poster">Modifier</button>
                </div>
                <button class="tag mt-2" id="button-null-own-poster">Supprimer la personnalisation</button>
            </div>
            <button class="modal-close is-large" aria-label="close"></button>
        </div>

        <div id="change-date-seen" class="modal">
            <div class="modal-background"></div>
            <div class="modal-content box">
                <h5 class="title">Changer la date de visionnage</h5>
                <div class="is-flex">
                    <input class="input mr-4" type="date" id="input-change-date-seen" />
                    <button class="button" id="button-change-date-seen">Modifier</button>
                </div>
                <button class="tag mt-2" id="button-null-date-seen">Supprimer la date</button>
            </div>
            <button class="modal-close is-large" aria-label="close"></button>
        </div>

        <div id="add-cast" class="modal">
            <div class="modal-background"></div>
            <div class="modal-content box">
                <form id="add-cast-form">

                    <h1 class="title" id="title-add-cast"></h1>

                    <div class="field is-hidden" id="div-role-cast">
                        <div>
                            <label for="role-cast" class="label mr-3">Nom du rôle :</label>
                            <input type="text" name="role-cast" id="role-cast" placeholder="Entrer le nom du personnage…" class="input" />
                        </div>
                    </div>

                    <div class="field mb-6" id="div-choose-people">
                        <div>
                            <label class="label" for="select-director" id="label-choose-people"></label>
                            <div class="select is-multiple">
                                <select name="select-people" id="select-people" style="max-width: 100%; min-width: 200px;" class="input" multiple required></select>
                            </div>
                        </div>
                    </div>

                    <div id="div-add-people" class="is-hidden" style="border: solid grey 1px; border-radius: 5px; padding: 5px;">
                        <h3 class="subtitle" id="subtitle-add-people"></h3>
                        <label class="label" for="firstname-people">Prénom</label>
                        <div class="control">
                            <input class="input" type="text" id="firstname-people" name="firstname-people" />
                        </div>
                        <label class="label" for="lastname-people">Nom</label>
                        <div class="control">
                            <input class="input" type="text" name="lastname-director" id="lastname-people" />
                        </div>
                        <label class="label" for="birthdate-people">Date de naissance</label>
                        <div class="control">
                            <input class="input" type="date" name="birthdate-director" id="birthdate-people" />
                        </div>
                        <label class="label" for="is-dead-people">
                            <input class="checkbox" type="checkbox" name="is-dead-director" id="is-dead-people" /> Mort
                        </label>
                        <div class="is-hidden" id="div-deathdate-people">
                            <label class="label" for="deathdate-people">Date de mort</label>
                            <div class="control">
                                <input class="input" type="date" name="deathdate-people" id="deathdate-people" />
                            </div>
                        </div>
                        <label class="label" for="nationalities-people">Nationalité(s)</label>
                        <div class="select is-multiple">
                            <select name="nationalities-people" id="nationalities-people" style="max-width: 100%; min-width: 200px;" multiple></select>
                        </div>

                        <div class="control mt-3">
                            <button class="button is-primary is-small" type="button" id="btn-add-people">
                                <span class="icon"><i class="fas fa-plus"></i></span><span>Ajouter dans la base</span>
                            </button>
                            <button class="button is-danger is-small is-light" type="button" id="btn-cancel-add-people">
                                <span class="icon"><i class="fas fa-minus"></i></span><span>Annuler l'ajout</span>
                            </button>
                        </div>
                    </div>

                    <div class="control mt-6">
                        <button class="button is-primary" type="button" id="btn-add-cast">
                            <span class="icon"><i class="fas fa-plus"></i></span><span id="span-add-cast"></span>
                        </button>
                    </div>

                </form>
            </div>
            <button class="modal-close is-large" aria-label="close"></button>
        </div>

    </section>

</main>

<script src="/Elina/js/ui/modal.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script type="module">
    import { movieContent, completeMovie } from "/Elina/js/modules/movies/movies.content.js";

    const params = new URLSearchParams(window.location.search);
    const movieId = params.get("id");
    
    movieContent(movieId);
    completeMovie(movieId);
</script>

<script type="module">
  import { loadNav } from "/Elina/js/core/nav.js";
  loadNav();
</script>

<script type="module" src="/Elina/js/core/guard.js"></script>
</body>
</html>
