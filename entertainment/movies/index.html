<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>엘리나 Elina - Films</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="/Elina/logos/daisy.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/Elina/logos/daisy.png">
  <link rel="stylesheet" href="/Elina/css/bulma.min.css">
  <link rel="stylesheet" href="/Elina/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>


<main>

  <section class="section">

    <div class="container">
      <div id="nav-container"></div>
      
      <h1 class="title">🎬 Films</h1>

      <div class="columns is-multiline">

        <div class="column is-one-quarter">
          <div class="card">
            <div class="card-content">
              <p class="title is-5">Tous les films</p>
              <a href="/Elina/entertainment/movies/all.html" class="button">Accéder</a>
            </div>
          </div>
        </div>
        

        <div class="column is-one-quarter">
          <div class="card">
            <div class="card-content">
              <p class="title is-5">Mes films</p>
              <a href="/Elina/entertainment/movies/list.html" class="button">Accéder</a>
            </div>
          </div>
        </div>

      </div>
      
    </div>

  </section>

  <section class="section">

    <div class="container box">

      <nav class="level is-primary">

          <div class="level-item has-text-centered">
              <div>
                  <p class="heading">Films vus</p>
                  <p class="title" id="moviesSeen"></p>
              </div>
          </div>

          <div class="level-item has-text-centered">
              <div>
                  <p class="heading">Temps de films</p>
                  <p class="title" id="moviesMinutesSeen"></p>
              </div>
          </div>

          <div class="level-item has-text-centered">
              <div>
                  <p class="heading">Films à voir</p>
                  <p class="title" id="moviesTosee"></p>
              </div>
          </div>

      </nav>

      <hr class="hr" />

      <div>
        <h3 class="subtitle">Films à voir</h3>
        <div class="grid">
          <div class="fixed-grid has-5-cols is-column-gap-2" id="toseeMovies"></div>
        </div>
      </div>

      <hr class="hr" />

      <div>
        <h3 class="subtitle">Derniers films vus</h3>
        <div id="lastSeenMovies"></div>
      </div>

      <hr class="hr" />

      <div>
        <h3 class="subtitle">Mes favoris</h3>
        <div id="favMovies"></div>
      </div>

    </div>

  </section>

</main>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script type="module">
  import { loadNav } from "/Elina/js/core/nav.js";
  loadNav();
  import { displayIndexMovies } from "/Elina/js/modules/movies/movies.display.js";
  displayIndexMovies();
</script>

<script type="module" src="/Elina/js/core/guard.js"></script>
</body>
</html>
