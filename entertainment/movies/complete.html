<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>엘리나 Elina - Données</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/Elina/logos/daisy.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/Elina/logos/daisy.png">
  <link rel="stylesheet" href="/Elina/css/bulma.min.css">
  <link rel="stylesheet" href="/Elina/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<section class="section">
  <div class="container">

    <div id="nav-container"></div>

    <!-- FORM FILM -->
    <div class="box">
      <h1 class="title"><span class="icon"><i class="fa-solid fa-pen-to-square"></i></span>Ajouter un casting de <i id="movie-title"></i></h1>

      <form id="movie-form">

        <div class="block">
          <h3 class="subtitle is-4">Ajouter un membre de casting :</h3>

          <label for="cast-job">Type de casting :</label>
          <div class="field select">
            <select name="cast-job" id="cast-job" required>
              <option value="director">Réalisateur</option>
              <option value="producer">Producteur</option>
              <option value="scriptwriter">Scénariste</option>
              <option value="actor">Acteur</option>
            </select>
          </div>

          <label for="cast-people">Personnalité :</label>
          <div class="field select">
            <select name="cast-people" id="cast-people" style="width: 100%;" required>
              <option value=""></option>
            </select>
          </div>

          <div id="div-role" class="is-hidden">
            <div class="field">
              <label for="cast-role">Rôle et personnage :</label>
              <input type="text" class="input" placeholder="Nom du rôle…" id="cast-role" name="cast-role" />
              <div class="select">
                <select name="cast-type-role" id="cast-type-role">
                  <option value="" disabled>Choisir un type de rôle</option>
                  <option value="leading">Rôle principal</option>
                  <option value="supporting">Rôle secondaire</option>
                  <option value="extra">Figurant</option>
                </select>
              </div>
            </div>
          </div>
          
          <div id="div-scriptwriter-1" class="mb-3 py-3">
            <div class="columns">

              <div class="column is-1"></div>
              <div class="column is-11">
                <div class="field select is-multiple">
                  <select multiple="multiple" id="select-scriptwriter-1" style="width: 100%;" required>
                    <option value=""></option>
                  </select>
                </div>
              </div>

            </div>
          </div>

          <div id="div-scriptwriter-2" class="is-hidden mb-3 py-3">

            <div class="columns">

              <div class="column is-1">
                <button class="button delete is-large" id="delete-scriptwriter-2"></button>
              </div>
              <div class="column is-11">
                <div class="select is-multiple">
                  <select multiple="multiple" id="select-scriptwriter-2" style="width: 100%;" >
                    <option value=""></option>
                  </select>
                </div>
              </div>

            </div>
          </div>

        </div>

      </form>

    </div>
  </div>

  <div id="add-new-people-modal" class="modal">
    <div class="modal-background"></div>
    <div class="modal-content box">

      <h5 class="title">Ajouter un people</h5>

      <form id="people-form">

        <div class="field">
          <label for="firstname">Prénom</label>
          <div class="control">
            <input type="text" class="input" placeholder="Prénom…" id="firstname" name="firstname" />
          </div>
        </div>

        <div class="field">
          <label for="lastname">Nom</label>
          <div class="control">
            <input type="text" class="input" placeholder="Nom…" id="lastname" name="lastname" />
          </div>
        </div>

        <div class="field">
          <label for="birthdate">Date de naissance</label>
          <div class="control">
            <input type="date" class="input" placeholder="Date de naissance…" id="birthdate" name="birthdate" />
          </div>
        </div>

        <div class="field">
          <label for="isDead"><input type="checkbox" class="checkbox mr-2" id="isDead" />Mort</label>
          <div class="field is-hidden" id="div-deathdate">
            <label for="deathdate">Date de mort</label>
            <div class="control">
              <input type="date" name="deathdate" id="deathdate" placeholder="Date de mort…" class="input" />
            </div>
          </div>
        </div>

        <div class="field">
          <label for="nationalities">Nationalités</label>
          <div class="control">
            <div class="select is-multiple">
              <select multiple="multiple" id="nationalities" style="width: 100%;"></select>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="jobs">Métiers</label>
          <div class="control">
            <div class="select is-multiple">
              <select name="jobs" id="jobs" multiple="multiple" style="width: 100%;">
                <option value="director">Réalisateur</option>
                <option value="scriptwriter">Scénariste</option>
                <option value="producer">Producteur</option>
                <option value="actor">Acteur</option>
              </select>
            </div>
          </div>
        </div>

        <div class="block">
          <div class="field">
            <div class="control">
              <button class="button is-primary" type="button" id="add-people">Ajouter le people</button>
            </div>
          </div>
        </div>

      </form>

    </div>
    <button class="modal-close is-large" aria-label="close"></button>
  </div>

</section>

<!-- JS -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script type="module">
    import { completeMovie } from "/Elina/js/modules/movies/movies.complete.js";

    const params = new URLSearchParams(window.location.search);
    const movieId = params.get("id");

    completeMovie(movieId);
</script>

<script type="module">
  import { loadNav } from "/Elina/js/core/nav.js";
  loadNav();
</script>

<script type="module" src="/Elina/js/core/guard.js"></script>
<script type="module" src="/Elina/js/ui/modal.js"></script>

</body>
</html>
