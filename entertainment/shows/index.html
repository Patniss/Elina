<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>엘리나 Elina - Films</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="/Elina/logos/daisy.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/Elina/logos/daisy.png">
  <link rel="stylesheet" href="/Elina/css/bulma.min.css">
  <link rel="stylesheet" href="/Elina/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>


<main>

  <section class="section">

    <div class="container">
      <div id="nav-container"></div>
      
      <h1 class="title is-1">🎬 Séries TV</h1>

      <div class="container box">

        <nav class="level is-primary">

            <div class="level-item has-text-centered">
                <div>
                    <p class="heading">Séries en cours</p>
                    <p class="title is-2 has-text-primary" id="shows-current"></p>
                </div>
            </div>

            <div class="level-item has-text-centered">
                <div>
                    <p class="heading">Épisodes vus</p>
                    <p class="title is-2 has-text-primary" id="episodes-seen"></p>
                </div>
            </div>

            <div class="level-item has-text-centered">
                <div>
                    <p class="heading">Temps total</p>
                    <p class="title is-2 has-text-primary" id="total-time-seen"></p>
                </div>
            </div>

            <div class="level-item has-text-centered">
                <div>
                    <p class="heading">Épisodes à voir</p>
                    <p class="title is-1 has-text-primary" id="tosee-current"></p>
                </div>
            </div>

        </nav>

        <hr class="hr" />

        <div>
          <h3 class="subtitle">Séries en cours</h3>
          <div id="current-shows"></div>
        </div>

        <hr class="hr" />

        <div>
          <h3 class="subtitle">Séries à commencer</h3>
          <div id="tostart-shows"></div>
        </div>

        <hr class="hr" />

        <div>
          <h3 class="subtitle">Mes séries favorites</h3>
          <div class="fixed-grid has-7-cols is-column-gap-2">
            <div class="grid" id="shows-fav"></div>
          </div>
        </div>

      </div>

      <div class="columns is-multiline">

        <div class="column is-one-quarter">
          <div class="card">
            <div class="card-content">
              <p class="title is-5">Toutes les séries</p>
              <a href="/Elina/entertainment/shows/all.html" class="button">Accéder</a>
            </div>
          </div>
        </div>
        

        <div class="column is-one-quarter">
          <div class="card">
            <div class="card-content">
              <p class="title is-5">Mes séries</p>
              <a href="/Elina/entertainment/shows/list.html" class="button">Accéder</a>
            </div>
          </div>
        </div>

      </div>
      
    </div>

  </section>

</main>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script type="module">
  import { loadNav } from "/Elina/js/core/nav.js";
  loadNav();
  import { displayIndexShows } from "/Elina/js/modules/shows/shows.display.js";
  displayIndexShows();
</script>

<script type="module" src="/Elina/js/core/guard.js"></script>
</body>
</html>
