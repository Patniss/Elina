<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>엘리나 Elina - Série</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/Elina/logos/daisy.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/Elina/logos/daisy.png">
  <link rel="stylesheet" href="/Elina/css/bulma.min.css">
  <link rel="stylesheet" href="/Elina/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>


<main>
    
    <section class="section">
        
        <div class="container">
            
            <div id="nav-container"></div>
            
            <div class="box">

                <h3 class="title" id="show-title"></h3>

                <div class="columns is-four-fifths">
                    <div class="column carousel-container">
                        <button class="button is-primary nav-arrow left" id="posters-prev-btn"><i class="fa-solid fa-angle-left"></i></button>
                        <div class="carousel-track" id="posters-show"></div>
                        <button class="button is-primary nav-arrow right" id="posters-next-btn"><i class="fa-solid fa-angle-right"></i></button>
                    </div>
                    <div class="column block is-three-quarters">
                        <div class="buttons mb-2" id="show-list-buttons">
                            <button class="button is-link is-hidden" id="button-add-show"><span class="icon"><i class="fa-solid fa-plus"></i></span><span>Ajouter</span></button>
                            <button class="button is-success is-light is-hidden" id="button-current-show"><span class="icon"><i class="fa-solid fa-eye"></i></span><span id="next-episode"></span></button>
                            <button class="button is-danger is-light is-hidden" id="button-paused-show"><span class="icon"><i class="fa-solid fa-pause"></i></span><span>Mettre en pause</span></button>
                            <button class="button is-link is-light is-hidden" id="button-retake-show"><span class="icon"><i class="fa-solid fa-play"></i></span><span>Reprendre</span></button>
                            <button class="button is-danger is-light is-hidden" id="button-cancel-show"><span class="icon"><i class="fa-solid fa-minus"></i></span><span>Abandonner</span></button>
                            <button class="button is-danger is-light is-hidden" id="button-retry-show"><span class="icon"><i class="fa-solid fa-minus"></i></span><span>Réessayer</span></button>
                            <button class="button is-success is-hidden" id="button-finished-show"><span class="icon"><i class="fa-solid fa-check"></i></span><span>Terminée</span></button>
                        </div>
                        <div id="div-seen" class="is-hidden mb-4">
                            <button id="show-fav" class="tag is-large is-hoverable" style="background-color: transparent;"><i class="fa-solid fa-heart"></i></button>
                            <button id="show-unlike" class="tag is-large is-hoverable" style="background-color: transparent;"><i class="fa-solid fa-heart-crack"></i></button>
                        </div>
                        <p class="subtitle is-4 mb-6"><span class="mr-3" id="show-genres"></span><span class="mr-3">&#x2022;</span><span class="mr-3" id="show-seasons"></span></p>
                        <ul id="show-platforms mt-6"></ul>
                        <h3 class="subtitle is-4 mt-6 mb-2">Synopsis</h3>
                        <p class="content" id="show-synopsis"></p>
                    </div>
                </div>
            
            </div>
        </div>

    </section>

</main>

<script src="/Elina/js/ui/modal.js"></script>

<script type="module">
    import { showContent } from "/Elina/js/modules/shows/shows.content.js";

    const params = new URLSearchParams(window.location.search);
    const showId = params.get("id");
    
    showContent(showId);
</script>

<script type="module">
  import { loadNav } from "/Elina/js/core/nav.js";
  loadNav();
</script>

<script type="module" src="/Elina/js/core/guard.js"></script>
</body>
</html>
